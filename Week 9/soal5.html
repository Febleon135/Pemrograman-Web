<!DOCTYPE html>
<html>
<head>
    <title>Nomor 5</title>
    <script src="jquery-4.0.0.min.js"></script>
    <style>
        .container {
            border: 1px solid #ccc;
            padding: 20px;
            width: 300px;
            background: linear-gradient(to bottom, #ffffff, #e6e6e6);
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }
        input[type="text"] {
            width: 100%;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .company-list div {
            margin-bottom: 5px;
            font-family: sans-serif;
            color: #333;
        }
        .highlight {
            color: red !important;
        }
    </style>
    <script>
        $(document).ready(function() {
            $("#findText").keyup(function() {
                var search = $(this).val();
                
                $(".company-list div").removeClass("highlight");

                if (search !== "") {
                    $(".company-list div:contains('" + search + "')").addClass("highlight");
                }
            });
        });
    </script>
</head>
<body>

    <div class="container">
        <input type="text" id="findText">
        
        <div class="company-list">
            <div>Sun Microsystem</div>
            <div>Apache Software Foundation</div>
            <div>Oracle Coorporation</div>
            <div>International Bussiness Machines</div>
            <div>Microsoft Coorporation</div>
            <div>Apple Inc</div>
            <div>Sap Ag</div>
            <div>Accenture</div>
            <div>Computer Sciences Coorporation</div>
            <div>Google</div>
            <div>Softbank</div>
            <div>Yahoo</div>
        </div>
    </div>

</body>
</html>
