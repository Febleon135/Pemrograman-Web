<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soal 2</title>
</head>
<body>
    <table border="1">
        <tr>
            <td colspan="2" style="text-align: center; font-size: xx-large;">Edit Profile</td>
        </tr>
        <tr>
            <td>
                <img src="https://jendelapuspita.com/wp-content/uploads/2025/05/TIM-BERNERS-LEE.jpg" alt="foto-joshua-lewi" style="width: 150px; height: 150px;">
                <div style="display: flex; justify-content: center;"><input type="button" value="Upload"></div>
            </td>
            <td>
                <table border="0">
                    <tr>
                        <td>Name</td>
                        <td>Tim Berners-Lee</td>
                    </tr>
                    <tr>
                        <td>Position</td>
                        <td><select name="position" id="position">
                            <optgroup label="Senior Programmer">
                                <option value="senior_programmer">Senior Programmer</option>
                                <option value="junior_programmer">Junior Programmer</option>
                            </optgroup>
                            <optgroup label="System Analyst">
                                <option value="senior_analyst">Senior Analyst</option>
                                <option value="junior_analyst">Junior Analyst</option>
                            </optgroup>
                        </select></td>
                    </tr>
                    <tr>
                        <td>Password</td>
                        <td><input type="text"></td>
                    </tr>
                    <tr>
                        <td>Confirm Password</td>
                        <td><input type="password"></td>
                    </tr>
                </table>
                <div style="text-align: right; margin-top: 30px;">
                    <input type="reset" value="Reset">
                    <input type="submit" value="Submit">
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
