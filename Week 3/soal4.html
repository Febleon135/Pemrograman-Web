<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soal 4</title>
</head>
<body>
    <h1>Form Tambah Data User</h1>
    <form action="#">
        <table border="0">
            <tr>
                <td>Name</td>
                <td>:</td>
                <td><input type="text" name="nama" required oninvalid="this.setCustomValidity('Name is required!!!')" 
                               oninput="this.setCustomValidity('')"></td>
            </tr>
            <tr>
                <td>Address</td>
                <td>:</td>
                <td><input type="text" name="alamat" oninvalid="this.setCustomValidity('Address is required!!!')" 
                               oninput="this.setCustomValidity('')"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td>:</td>
                <td><input type="email" name="email" oninvalid="this.setCustomValidity('Harap isi bidang ini.')" 
                               oninput="this.setCustomValidity('')"></td>
            </tr>
            <tr>
                <td>Home Page</td>
                <td>:</td>
                <td><input type="url" name="home_page"></td>
            </tr>
            <tr>
                <td>Birthday</td>
                <td>:</td>
                <td><input type="date" name="birthday"></td>
            </tr>
            <tr>
                <td>Favorite Color</td>
                <td>:</td>
                <td><input type="color" name="favorite_color"></td>
            </tr>
            <tr>
                <td>IPK</td>
                <td>:</td>
                <td><input type="number" name="ipk" min="0" max="4" step="0.1" value="0" style="width: 80px;"></td>
            </tr>
            <tr>
                <td>Phone Number</td>
                <td>:</td>
                <td><input type="tel" name="phone" minlength="10" maxlength="13" pattern="[0-9]{3}-[0-9]{7,10}" placeholder="xxx-xxxxxxx"></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td><div><input type="submit" value="Add"></td>
            </tr>
        </table>
    </form>
</body>
</html>
