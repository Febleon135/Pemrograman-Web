<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>nomor 2</title>
    <style>
        .posisi {
            position: relative;
            margin: 50px;
        }
        
        img {
            width: 200px;
            height: 200px;
        }

        .kiri, .tengah, .kanan {
            position: absolute;
        }

        .kiri {
            top: 0;
            left: 0;
            z-index: 1;
        }

        .tengah {
            top: 0;
            left: 120px;
            z-index: 2;
        }

        .kanan {
            top: 0;
            left: 240px;
            z-index: 1;
        }

        .bungkus-kiri {
            position: absolute;
            top: 0;
            left: 0;
            width: 200px;
            height: 100px;
            overflow: hidden;
            z-index: 3;
        }

        .bungkus-kanan {
            position: absolute;
            top: 100px;
            left: 240px;
            width: 200px;
            height: 100px;
            overflow: hidden;
            z-index: 3;
        }

        .geser-naik {
            position: absolute;
            top: -100px;
            left: 0;
        }
    </style>
</head>
<body>
    <div class="posisi">
        <img src="src/circle-red.png" class="kiri">
        <img src="src/circle-purple.png" class="tengah">
        <img src="src/circle-red.png" class="kanan">
        
        <div class="bungkus-kiri">
            <img src="src/circle-red.png">
        </div>
        
        <div class="bungkus-kanan">
            <img src="src/circle-red.png" class="geser-naik">
        </div>
    </div>
</body>
</html>
