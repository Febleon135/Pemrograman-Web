<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Soal 6</title>

    <style>
      table {
        border-collapse: collapse;
        width: 400px;
      }

      table,
      th,
      td {
        border: 1px solid #98bf21;
      }

      th,
      td {
        padding: 4px;
        text-align: left;
      }

      th {
        background-color: #98bf21;
        color: white;
      }

      tr:nth-child(odd) td:nth-child(odd) {
        background-color: #e3f0be;
      }

      tr:nth-child(odd) td:nth-child(even) {
        background-color: #fbfea1;
      }

      tr:nth-child(even) td:nth-child(odd) {
        background-color: #fbfea1;
      }

      tr:nth-child(even) td:nth-child(even) {
        background-color: #e3f0be;
      }

      .footer {
        background-color: #98bf21 !important;
        color: white;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <table>
      <tr>
        <th>Company</th>
        <th>Contact</th>
        <th>Country</th>
      </tr>

      <tr>
        <td>Alfreds Futterkiste</td>
        <td>Maria Anders</td>
        <td>Germany</td>
      </tr>

      <tr>
        <td>Berglunds snabbköp</td>
        <td>Christina Berglund</td>
        <td>Sweden</td>
      </tr>

      <tr>
        <td>Centro comercial Moctezuma</td>
        <td>Francisco Chang</td>
        <td>Mexico</td>
      </tr>

      <tr>
        <td>Ernst Handel</td>
        <td>Roland Mendel</td>
        <td>Austria</td>
      </tr>

      <tr>
        <td>Island Trading</td>
        <td>Helen Bennett</td>
        <td>UK</td>
      </tr>

      <tr>
        <td colspan="3" class="footer">© www.w3schools.org</td>
      </tr>
    </table>
  </body>
</html>
