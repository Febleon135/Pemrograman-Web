<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>nomor 1</title>
    <script>
        function call_onKeyPress(ob) {
            var obval = ob.value;

            if (obval.length > 256) {
                ob.value = obval.substr(0, 256);
                obval = ob.value;
            }

            document.getElementById("txt2").value = obval.length + "/256";
        }
    </script>
    <style>
        .card {
            padding: 20px;
            width: 350px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.3);
        }

        .row {
            display: flex;
            margin-bottom: 10px;
        }

        .label {
            width: 80px;
        }

        .input-area {
            flex: 1;
        }

        input[type="text"],
        textarea {
            width: 100%;
            box-sizing: border-box;
        }

        textarea {
            height: 100px;
            resize: none;
        }

        .counter-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 5px;
        }

        #txt2 {
            width: 60px;
            text-align: right;
            border: 1px solid #ccc;
            padding: 2px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="row">
            <div class="label">Judul</div>
            <div style="margin-right: 5px;">:</div>
            <div class="input-area">
                <input type="text">
            </div>
        </div>
        <div class="row">
            <div class="label">Deskripsi</div>
            <div style="margin-right: 5px;">:</div>
            <div class="input-area">
                <textarea onkeyup="call_onKeyPress(this)" onkeydown="call_onKeyPress(this)"></textarea>
                <div class="counter-container">
                    <input type="text" id="txt2" value="0/256" readonly>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
