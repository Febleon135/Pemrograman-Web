<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>nomor 3</title>
    <style>
        .container {
            border: 1px solid #999;
            padding: 15px;
            width: 320px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.2);
            background-color: #fff;
        }
        .row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .label {
            font-size: 24px;
            width: 80px;
        }
        input[type="text"] {
            flex: 1;
            padding: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 5px 15px;
            margin-right: 15px;
            cursor: pointer;
        }
        select {
            flex: 1;
            padding: 5px;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row">
        <div class="label">Data</div>
        <input type="text" id="inputData">
    </div>
    <div class="row">
        <button onclick="addData()">Add</button>
        <select id="operasi" onchange="prosesData(this.value)">
            <option value="">Pilih Operasi</option>
            <option value="display">Display</option>
            <option value="count">Count</option>
            <option value="sum">Sum</option>
            <option value="average">Average</option>
            <option value="max">Max</option>
            <option value="min">Min</option>
            <option value="ganjil">Ganjil</option>
            <option value="genap">Genap</option>
            <option value="hapus">Hapus</option>
        </select>
    </div>
    <div class="row">
        <div class="label">Hasil</div>
        <input type="text" id="hasil" readonly>
    </div>
</div>

<script>
    var dataArray = [];

    function addData() {
        var input = document.getElementById("inputData");
        var value = parseFloat(input.value);
        
        if (!isNaN(value)) {
            dataArray.push(value);
            input.value = "";
            input.focus();
        }
    }

    function prosesData(operasi) {
        var output = document.getElementById("hasil");
        
        if (dataArray.length === 0 && operasi !== "hapus") {
            output.value = "Data Kosong";
            return;
        }

        if (operasi === "display") {
            output.value = dataArray.join(", ");
        } 
        else if (operasi === "count") {
            output.value = dataArray.length;
        } 
        else if (operasi === "sum") {
            var total = dataArray.reduce((a, b) => a + b, 0);
            output.value = total;
        } 
        else if (operasi === "average") {
            var total = dataArray.reduce((a, b) => a + b, 0);
            output.value = (total / dataArray.length).toFixed(2);
        } 
        else if (operasi === "max") {
            output.value = Math.max(...dataArray);
        } 
        else if (operasi === "min") {
            output.value = Math.min(...dataArray);
        } 
        else if (operasi === "ganjil") {
            var ganjil = dataArray.filter(n => n % 2 !== 0);
            output.value = ganjil.join(", ");
        } 
        else if (operasi === "genap") {
            var genap = dataArray.filter(n => n % 2 === 0);
            output.value = genap.join(", ");
        } 
        else if (operasi === "hapus") {
            dataArray = [];
            output.value = "";
            document.getElementById("operasi").value = "";
        }
    }
</script>

</body>
</html>
