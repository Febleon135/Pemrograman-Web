<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Keyboard</title>
    <style>
        body {
            background-color: #323437;
            color: #e2b714;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            margin: 0;
        }

        textarea {
            width: 80%;
            height: 150px;
            background-color: #323437;
            border: 1px solid #e2b714;
            color: #e2b714;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            resize: none;
            margin-bottom: 30px;
        }

        table {
            width: 80%;
            border-collapse: collapse;
            text-align: center;
            user-select: none;
        }

        td {
            border: 1px solid #e2b714;
            padding: 15px 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        td:active {
            background-color: rgba(226, 183, 20, 0.2);
        }

        .highlight {
            color: aqua;
        }

        .space-bar {
            width: 50%;
        }

        footer {
            margin-top: 50px;
            width: 100%;
            border-top: 1px solid #e2b714;
            padding: 10px 0;
            text-align: center;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <textarea id="output" placeholder="Ketik di sini atau gunakan keyboard di bawah..."></textarea>

    <table>
        <tr>
            <td>~</td>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
            <td>5</td>
            <td>6</td>
            <td>7</td>
            <td>8</td>
            <td>9</td>
            <td>0</td>
            <td>-</td>
            <td>=</td>
            <td colspan="2" class="highlight">Backspace</td>
        </tr>
        <tr>
            <td colspan="2" class="highlight">Tab</td>
            <td class="key">Q</td>
            <td class="key">W</td>
            <td class="key">E</td>
            <td class="key">R</td>
            <td class="key">T</td>
            <td class="key">Y</td>
            <td class="key">U</td>
            <td class="key">I</td>
            <td class="key">O</td>
            <td class="key">P</td>
            <td>[</td>
            <td>]</td>
            <td>\</td>
        </tr>
        <tr>
            <td colspan="2" class="highlight">Caps Lock</td>
            <td class="key">A</td>
            <td class="key">S</td>
            <td class="key">D</td>
            <td class="key">F</td>
            <td class="key">G</td>
            <td class="key">H</td>
            <td class="key">J</td>
            <td class="key">K</td>
            <td class="key">L</td>
            <td>;</td>
            <td>'</td>
            <td colspan="2" class="highlight">Enter</td>
        </tr>
        <tr>
            <td colspan="2" class="highlight">Shift</td>
            <td class="key">Z</td>
            <td class="key">X</td>
            <td class="key">C</td>
            <td class="key">V</td>
            <td class="key">B</td>
            <td class="key">N</td>
            <td class="key">M</td>
            <td>,</td>
            <td>.</td>
            <td>/</td>
            <td colspan="3" class="highlight">Shift</td>
        </tr>
        <tr>
            <td class="highlight">Ctrl</td>
            <td class="highlight">Alt</td>
            <td colspan="10" id="space" class="highlight">Space</td>
            <td class="highlight">Alt</td>
            <td colspan="2" class="highlight">Ctrl</td>
        </tr>
    </table>

    <footer>
        &copy; 2473021 Febrianus Leona Putra - Text Editor
    </footer>

    <script>
        const textarea = document.getElementById('output');
        const keys = document.querySelectorAll('td');

        keys.forEach(key => {
            key.addEventListener('click', () => {
                const content = key.innerText;

                if (content === 'Space') {
                    textarea.value += ' ';
                } else if (content === 'Backspace') {
                    textarea.value = textarea.value.slice(0, -1);
                } else if (content === 'Enter') {
                    textarea.value += '\n';
                } else if (content === 'Tab') {
                    textarea.value += '    ';
                } else if (content.length === 1) {
                    textarea.value += content;
                }
            });
        });
    </script>

</body>
</html>
